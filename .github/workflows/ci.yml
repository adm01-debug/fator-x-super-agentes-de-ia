name: Nexus CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: false

  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/ --ext .ts,.tsx --max-warnings 0

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, security-audit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx vitest run --reporter=verbose --coverage
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: coverage/

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request'
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npx playwright test
      - name: Auth E2E status
        if: always()
        run: |
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY not set — auth-flows.spec.ts skipped. Add the secret to enable full auth E2E coverage."
          else
            echo "Auth E2E ran with synthetic users."
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
      - name: Upload visual diff artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-diffs
          path: |
            test-results/
            e2e/__screenshots__/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      - name: Bundle size budget
        run: npm run check:bundle
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bundle-report
          path: dist/bundle-report.html

  lighthouse:
    name: Lighthouse CI (${{ matrix.profile }})
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        profile: [desktop, mobile]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      - name: Run Lighthouse CI (${{ matrix.profile }})
        run: |
          if [ "${{ matrix.profile }}" = "mobile" ]; then
            npx @lhci/cli@0.15.x autorun --config=./lighthouserc.mobile.json
          else
            npx @lhci/cli@0.15.x autorun
          fi
        continue-on-error: true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lighthouse-report-${{ matrix.profile }}
          path: .lighthouseci/

  load-test:
    name: Load Test (k6 — llm-gateway)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        uses: grafana/setup-k6-action@v1
      - name: Smoke test (always)
        run: k6 run --vus 1 --duration 30s tests/load/llm-gateway.k6.js
      - name: Full load test (label-gated)
        if: contains(github.event.pull_request.labels.*.name, 'load-test')
        run: k6 run tests/load/llm-gateway.k6.js
      - name: Load test status
        if: always()
        run: |
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY not set — k6 ran in skip mode. Add the secret for real load coverage."
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: k6-summary
          path: summary.json
