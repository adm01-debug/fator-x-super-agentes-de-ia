name: CI

on:
  push:
    branches: [main, claude/*]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint + Types + Tests + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript strict check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Production build
        run: npx vite build

      - name: Check bundle size
        run: |
          MAIN_SIZE=$(stat -c%s dist/assets/index-*.js 2>/dev/null || echo 0)
          echo "Main bundle: ${MAIN_SIZE} bytes"
          if [ "$MAIN_SIZE" -gt 300000 ]; then
            echo "::warning::Main bundle exceeds 300KB ($MAIN_SIZE bytes)"
          fi
